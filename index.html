<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAILWIND PROJECT</title>
    <link rel="stylesheet" href="./css/output.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
     <header class="h-25 w-full border-b border-white-shade/10 sticky top-0 z-50 bg-Dark-blue shadow-xl">
        <nav class="h-full w-9/10 mx-auto flex items-center justify-between px-4 relative">

            <div class="flex flex-row gap-3">
                <span class="self-start w-15 h-15 flex justify-center items-center bg-Light blue rounded-lg bg-blue-700 ">
                    <i class="fa-solid fa-bolt text-white-shade"></i>
                </span>
                <h1 class="text-4xl font-bold text-white-shade flex items-center justify-center">Nexus<h1>
            </div>

            <!--Desktop-->
            <ul class="hidden lg:flex gap-10 items-center">
                <li>
                    <a href="#" class="text-white-shade text-2xl hover:text-Green font-medium">Home</a>
                </li>
                <li>
                    <a href="#" class="text-white-shade text-2xl hover:text-Green font-medium">Services</a>
                </li>
                <li>
                    <a href="#" class="text-white-shade text-2xl hover:text-Green font-medium">About</a>
                </li>
                <li>
                    <a href="#" class="text-white-shade text-2xl hover:text-Green font-medium">Contact</a>
                </li>
            </ul>
            
            <div class=" hidden lg:flex gap-10 items-center">
                <a href="#" class="bg-blue-700 text-2xl py-5 px-10 rounded-2xl text-white-shade font-medium hover:translate-y-2 ">Get Started</a>
            </div>


            <!--mobile--->
            <div class="lg:hidden">
                <button>
                    <i class="fa-solid fa-bars text-white-shade text-4xl"></i>
                </button>
            

                <ul class="  absolute top-full left-0 bg-Dark-blue border-t border-b border-r border-black/10 w-3/5 max-w-60 h-[calc(100vh-4.5rem)] flex-col gap-5 items-center justify-center hidden">
                    <li>
                        <a href="#" class="text-white-shade text-sm hover:text-Green font-medium">Home</a>
                    </li>
    
                    <li>
                        <a href="#" class="text-white-shade text-sm hover:text-Green font-medium">Services</a>
                    </li>
                    <li>
                        <a href="#" class="text-white-shade text-sm hover:text-Green font-medium">About</a>
                    </li>
                    <li>
                        <a href="#" class="text-white-shade text-sm hover:text-Green font-medium">Contact</a>
                    </li>
                    <li>
                        <a href="#" class="text-white-shade text-sm hover:text-Green font-medium">Get Started</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="w-full h-[calc(100vh-6.25rem)] bg-Dark-blue py-7 lg:py-20">

            <div class="w-9/10 max-w-8xl mx-auto grid grid-cols-1 lg:grid-cols-2">

                <div class="h-full relative z-2 flex flex-col gap-6 md:gap-10">

                    <h1 class="text-white-shade font-bold text-4xl      lg:text-6xl 2xl:text-8xl w-9/10 max-w-150  2xl:max-w-150">
                        Building Your <span class="text-blue-400">Digital</span> Future
                    </h1>

                    <p class=" text-white-shade w-9/10 max-w-150 2xl:max-w-180 text-sm lg:text-2xl 2xl:text-2xl">
                        Transform your business with cutting-edge solutions that drive growth and innovation in the digital landscape. 
                    </p>

                    <div class="flex flex-col md:flex-row gap-3 lg:gap-5 lg:mt-16">
                        <a href="#" class="text-2xl bg-blue-500 text-white-shade py-2 lg:py-5 px-16 rounded-2xl font-bold">Start Your Journey</a>
                        <a href="#" class=" text-2xl border border-white-shade text-white shade py-2 lg:py-5 px-16 rounded-2xl font-bold">Learn More</a>
                    </div>

                </div>

                <div class="w-full md:max-w-auto">
                    <img src="./images/hero-image.png" alt="hero-image" class="w-full h-full object-cover aspect-4/3 rounded-2xl">
                </div>
            </div>
        </section>

        <section>

        </section>
